services:
  - type: web
    name: instaretriv-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: METADATA_BACKEND
        value: mongo
      - key: MONGODB_DATABASE
        value: instaretriv_ai
      - key: MONGODB_COLLECTION
        value: documents
      - key: REQUIRE_TWILIO_SIGNATURE
        value: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SECONDARY_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: AUTHORIZED_SENDERS
        sync: false
      - key: MONGODB_URI
        sync: false
